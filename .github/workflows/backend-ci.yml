name: Backend CI

on:
  push:
    branches: [main, master]
    paths:
      - "backend/**"
      - ".github/workflows/backend-ci.yml"
  pull_request:
    branches: [main, master]
    paths:
      - "backend/**"

defaults:
  run:
    working-directory: backend

jobs:
  lint:
    name: Lint (ruff + mypy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/pyproject.toml

      - name: Install dev dependencies
        run: pip install -e ".[dev]"

      - name: ruff check
        run: ruff check app/

      - name: ruff format check
        run: ruff format --check app/

      - name: mypy
        run: mypy app/

  test:
    name: Unit + Integration tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: test_odoo_monitor
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      APP_ENV: test
      DATABASE_URL: postgresql+asyncpg://test:test@localhost:5432/test_odoo_monitor
      DATABASE_URL_SYNC: postgresql+psycopg2://test:test@localhost:5432/test_odoo_monitor
      REDIS_URL: redis://localhost:6379/0
      SECRET_KEY: test_secret_key_that_is_at_least_32_chars_long!!
      ENCRYPTION_KEY: dGVzdF9mZXJuZXRfa2V5XzMyYnl0ZXNfZXhhY3RseV8=
      JWT_ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: "60"
      REFRESH_TOKEN_EXPIRE_DAYS: "7"
      LOG_LEVEL: WARNING

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/pyproject.toml

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run Alembic migrations
        run: alembic upgrade head

      - name: pytest
        run: pytest tests/ -v --tb=short
